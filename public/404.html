<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сторінку не знайдено | Олександр Кравченко</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --milk: #F5F0EA; --blue-deep: #1B3A5C; --blue-mid: #2E6B9E;
    --blue-sky: #5BA4D9; --ink: #1A1A1A; --ink-soft: #4A4A4A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--milk); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .container { max-width: 480px; }
  .code {
    font-family: 'Instrument Serif', serif; font-size: 8rem; line-height: 1;
    color: var(--blue-deep); margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Instrument Serif', serif; font-size: 1.8rem;
    color: var(--blue-deep); margin-bottom: 0.75rem;
  }
  p { color: var(--ink-soft); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
  a {
    display: inline-block; padding: 0.75rem 2rem; background: var(--blue-deep);
    color: var(--milk); text-decoration: none; border-radius: 8px; font-weight: 500;
    transition: background 0.3s;
  }
  a:hover { background: var(--blue-mid); }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Сторінку не знайдено</h1>
  <p>Можливо, вона була переміщена або ви перейшли за застарілим посиланням.</p>
  <a href="/">На головну</a>
</div>
</body>
</html>
